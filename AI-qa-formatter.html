<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>AI Q&A 채팅 포메터 (메타데이터 제거)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="icon32.png" />
  <link rel="icon" type="image/png" sizes="128x128" href="icon128.png" />
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --panel-soft: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #1d4ed8;
      --accent-soft: rgba(37, 99, 235, 0.08);
      --danger: #dc2626;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --radius-lg: 14px;
      --radius-md: 10px;
      --radius-pill: 999px;
      --shadow-soft: 0 10px 40px rgba(15, 23, 42, 0.08);
      --shadow-pill: 0 2px 8px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at top, #f8fafc, #eef2f7 45%, #e2e8f0 100%);
      color: var(--text);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 32px 16px;
    }

    .shell {
      width: 100%;
      max-width: 1120px;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
      padding: 18px 18px 20px;
      position: relative;
      overflow: hidden;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.08), transparent 55%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.06), transparent 55%);
      opacity: 0.6;
      pointer-events: none;
    }

    .shell-inner {
      position: relative;
      z-index: 1;
    }

    .shell-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }

    .shell-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .shell-logo {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      border-radius: 10px;
      display: block;
    }

    .shell-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .shell-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .shell-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 3px 8px;
      border-radius: var(--radius-pill);
      background: var(--accent-soft);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    h1 span.sub {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
    }

    .shell-desc {
      font-size: 12px;
      color: var(--text-muted);
      max-width: 520px;
    }

    .shell-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill-btn {
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text-muted);
      font-size: 12px;
      padding: 6px 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      box-shadow: var(--shadow-pill);
    }

    .pill-btn span.icon {
      font-size: 14px;
      opacity: 0.85;
    }

    .pill-btn:hover {
      border-color: #cbd5e1;
      color: var(--text);
    }

    .pill-btn-primary {
      border-color: #1d4ed8;
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      color: #ffffff;
    }

    .pill-btn-primary:hover {
      filter: brightness(1.05);
      color: #ffffff;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
      gap: 16px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: minmax(0, 1fr);
      }
      body {
        padding: 16px 10px;
      }
      .shell {
        border-radius: 22px;
        padding: 14px 14px 16px;
      }
    }

    .panel {
      border-radius: var(--radius-lg);
      background: #ffffff;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 260px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 11px 6px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-soft);
    }

    .panel-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .panel-badge {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      padding: 2px 6px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(59, 130, 246, 0.4);
      color: #1d4ed8;
      background: var(--accent-soft);
    }

    .panel-header-right {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .panel-body {
      padding: 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea {
      width: 100%;
      flex: 1;
      resize: vertical;
      min-height: 220px;
      background: #ffffff;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      outline: none;
    }

    textarea::placeholder {
      color: #94a3b8;
    }

    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      padding: 7px 13px;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      background: #ffffff;
      color: var(--text-muted);
    }

    .btn.primary {
      border-color: #1d4ed8;
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      color: #ffffff;
    }

    .btn.primary:hover {
      filter: brightness(1.06);
    }

    .btn:hover:not(.primary) {
      border-color: #94a3b8;
      color: var(--text);
      background: var(--panel-soft);
    }

    .btn span.icon {
      font-size: 14px;
    }

    .status-line {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #10b981;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.18);
    }

    .status-dot.error {
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.18);
    }

    .output-scroll {
      flex: 1;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: #ffffff;
      color: #0f172a;
      padding: 12px 14px;
      overflow: auto;
      font-size: 13px;
      line-height: 1.6;
    }

    .output-empty {
      font-size: 12px;
      color: #6b7280;
    }

    .qa-block {
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #cbd5e1;
    }

    .qa-block:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .q {
      color: #1d4ed8;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .a {
      color: #0f172a;
    }

    .a p {
      margin: 4px 0 8px;
      line-height: 1.65;
    }

    .a .md-heading {
      font-weight: 700;
      margin: 14px 0 4px;
      font-size: 14px;
      color: #0f172a;
    }

    .a blockquote {
      margin: 10px 0;
      padding: 8px 14px;
      border-left: 3px solid #94a3b8;
      background: var(--panel-soft);
      border-radius: 4px;
      color: var(--text);
    }

    .a blockquote p {
      margin: 0;
    }

    .a ul,
    .a ol {
      margin: 6px 0 10px;
      padding-left: 22px;
    }

    .a li {
      margin-bottom: 4px;
    }

    .a li > ul,
    .a li > ol {
      margin: 4px 0 4px;
    }

    .a code {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: var(--mono);
      font-size: 0.9em;
    }

    .a table {
      border-collapse: collapse;
      margin: 10px 0;
      width: 100%;
      font-size: 12.5px;
    }

    .a th,
    .a td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
      vertical-align: top;
    }

    .a th {
      background: var(--panel-soft);
      font-weight: 600;
    }

    .a strong {
      font-weight: 700;
    }

    .a em {
      font-style: italic;
    }

    .q em {
      font-style: italic;
    }

    .q code {
      background: rgba(29, 78, 216, 0.08);
      border: 1px solid rgba(29, 78, 216, 0.25);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: var(--mono);
      font-size: 0.9em;
    }

    .meta-line {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .muted {
      color: var(--text-muted);
    }

    .badge-small {
      border-radius: var(--radius-pill);
      border: 1px solid #cbd5e1;
      color: var(--text-muted);
      padding: 1px 7px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    .shortcut {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 5px;
    }

    .toast {
      position: fixed;
      inset-inline: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 50;
    }

    .toast-inner {
      pointer-events: auto;
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
    }

    .toast-inner span.icon {
      font-size: 14px;
      color: #16a34a;
    }

    .toast-inner.error span.icon {
      color: var(--danger);
    }

    .toast-inner.error {
      border-color: rgba(220, 38, 38, 0.5);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="shell-inner">
      <header class="shell-header">
        <div class="shell-brand">
          <img class="shell-logo" src="icon128.png" alt="" />
          <div class="shell-title">
            <div class="shell-title-row">
              <div class="shell-label" data-i18n="label">qa-포메터</div>
            </div>
            <h1>
              <span data-i18n="h1">AI Q&amp;A 채팅 포메터</span>
              <span class="sub" data-i18n="sub">메타데이터 제거, 질문은 파란색 굵은 글씨로</span>
            </h1>
            <p class="shell-desc" data-i18n-html="desc"></p>
          </div>
        </div>
        <div class="shell-actions">
          <button class="pill-btn" type="button" id="langToggle">
            <span class="icon">🌐</span>
            <span data-i18n="langToggle">English</span>
          </button>
          <button class="pill-btn" type="button" id="loadSample">
            <span class="icon">📎</span>
            <span data-i18n="loadSample">샘플 불러오기</span>
          </button>
          <button class="pill-btn pill-btn-primary" type="button" id="downloadHtml">
            <span class="icon">⬇️</span>
            <span data-i18n="download">HTML로 다운로드</span>
          </button>
        </div>
      </header>

      <main class="grid">
        <section class="panel">
          <div class="panel-header">
            <div class="panel-header-left">
              <div class="panel-title" data-i18n="inputTitle">원본 AI 채팅 텍스트</div>
              <div class="panel-badge" data-i18n="inputBadge">입력</div>
            </div>
            <div class="panel-header-right">
              <span class="shortcut">⌘+V/crtl+V</span>
              <span class="muted" data-i18n="pasteHere">여기에 붙여넣기</span>
            </div>
          </div>
          <div class="panel-body">
            <textarea id="input" data-i18n-placeholder="inputPlaceholder"></textarea>
            <div class="button-row">
              <button class="btn primary" type="button" id="formatBtn">
                <span class="icon">✨</span>
                <span data-i18n="format">포맷팅</span>
              </button>
              <button class="btn" type="button" id="clearBtn">
                <span class="icon">🧹</span>
                <span data-i18n="clear">지우기</span>
              </button>
            </div>
            <div class="status-line" id="statusLine">
              <span class="status-dot" id="statusDot"></span>
              <span id="statusText"></span>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div class="panel-header-left">
              <div class="panel-title" data-i18n="outputTitle">포맷된 Q&amp;A</div>
              <div class="panel-badge" data-i18n="outputBadge">출력</div>
            </div>
            <div class="panel-header-right">
              <span class="badge-small" data-i18n="questionsBlue">질문 = 파란색 굵은 글씨</span>
            </div>
          </div>
          <div class="panel-body">
            <div class="button-row">
              <button class="btn primary" type="button" id="copyRichBtn">
                <span class="icon">📋</span>
                <span data-i18n="copyRich">서식 있는 텍스트 복사</span>
              </button>
              <button class="btn" type="button" id="copyPlainBtn">
                <span class="icon">📄</span>
                <span data-i18n="copyPlain">일반 텍스트 복사</span>
              </button>
            </div>
            <div class="output-scroll" id="output"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="toast" id="toast" style="display:none;">
    <div class="toast-inner" id="toastInner">
      <span class="icon" id="toastIcon">✅</span>
      <span id="toastText"></span>
    </div>
  </div>

        toastCopiedRich: 'Copied formatted rich text.',
        toastCopyFailed: 'Copy failed. Try selecting manually.',
        toastCopyFailedPrefix: 'Copy failed: ',
        toastNothingToCopy: 'Nothing to copy yet.',
        toastCopiedPlain: 'Copied plain text.',
        toastClipboardBlocked: 'Clipboard blocked. Copy manually.',
        toastDownloaded: 'HTML downloaded.',
      },
    };

    let currentLang = localStorage.getItem('qa-formatter-lang') || 'ko';

    const inputEl = document.getElementById('input');
    const formatBtn = document.getElementById('formatBtn');
    const clearBtn = document.getElementById('clearBtn');
    const outputEl = document.getElementById('output');
    const copyRichBtn = document.getElementById('copyRichBtn');
    const copyPlainBtn = document.getElementById('copyPlainBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const toast = document.getElementById('toast');
    const toastInner = document.getElementById('toastInner');
    const toastIcon = document.getElementById('toastIcon');
    const toastText = document.getElementById('toastText');
    const loadSampleBtn = document.getElementById('loadSample');
    const downloadHtmlBtn = document.getElementById('downloadHtml');
    const langToggleBtn = document.getElementById('langToggle');

    let outputState = { kind: 'empty' };
    let lastBlocks = [];
    let statusState = { key: 'statusIdle', isError: false, args: null };

    function t(key) {
      return I18N[currentLang][key];
    }

    function applyLanguage() {
      document.documentElement.lang = currentLang === 'ko' ? 'ko' : 'en';
      document.title = t('docTitle');

      document.querySelectorAll('[data-i18n]').forEach((el) => {
        el.textContent = t(el.getAttribute('data-i18n'));
      });
      document.querySelectorAll('[data-i18n-html]').forEach((el) => {
        el.innerHTML = t(el.getAttribute('data-i18n-html'));
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach((el) => {
        el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
      });

      refreshStatus();
      refreshOutput();
    }

    function refreshStatus() {
      const v = I18N[currentLang][statusState.key];
      statusText.textContent = typeof v === 'function' ? v(statusState.args) : v;
      statusDot.classList.toggle('error', statusState.isError);
    }

    function setStatus(key, isError = false, args = null) {
      statusState = { key, isError, args };
      refreshStatus();
    }

    function refreshOutput() {
      if (outputState.kind === 'empty') {
        outputEl.innerHTML = `<div class="output-empty">${t('outputEmpty')}</div>`;
      } else if (outputState.kind === 'noBlocks') {
        outputEl.innerHTML = `<div class="output-empty">${t('noBlocksHtml')}</div>`;
      } else {
        renderBlocks(lastBlocks);
      }
    }

    function showToast(message, isError = false) {
      toastText.textContent = message;
      if (isError) {
        toastInner.classList.add('error');
        toastIcon.textContent = '⚠️';
      } else {
        toastInner.classList.remove('error');
        toastIcon.textContent = '✅';
      }
      toast.style.display = 'flex';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 2200);
    }

    function isResponseMarker(trimmed) {
      return /^#\s+\S.*\sresponse\s*$/i.test(trimmed);
    }

    function parseAIExport(text) {
      const blocks = [];
      const lines = text.split(/\r?\n/);
      let i = 0;

      while (i < lines.length) {
        if (lines[i].trim().toLowerCase().startsWith('# you asked')) {
          i++;
          const qLines = [];
          while (i < lines.length &&
                 !isResponseMarker(lines[i].trim())) {
            const trimmed = lines[i].trim();
            if (
              trimmed.toLowerCase().startsWith('message time:') ||
              trimmed.toLowerCase().startsWith('> from:') ||
              trimmed === '---' ||
              trimmed === ''
            ) {
              i++;
              continue;
            }
            qLines.push(lines[i]);
            i++;
          }

          if (i < lines.length && isResponseMarker(lines[i].trim())) {
            i++;
          }

          const aLines = [];
          while (i < lines.length &&
                 !lines[i].trim().toLowerCase().startsWith('# you asked')) {
            const trimmed = lines[i].trim();
            if (
              trimmed.toLowerCase().startsWith('message time:') ||
              trimmed.toLowerCase().startsWith('> from:') ||
              isResponseMarker(trimmed) ||
              trimmed === '---'
            ) {
              i++;
              continue;
            }
            aLines.push(lines[i]);
            i++;
          }

          const question = qLines.join('\n').trim();
          const answer = aLines.join('\n').trim();

          if (question || answer) {
            blocks.push({ question, answer });
          }
        } else {
          i++;
        }
      }

      return blocks;
    }

    function renderInline(text, container) {
      let i = 0;
      let buffer = '';
      const flush = () => {
        if (buffer) {
          container.appendChild(document.createTextNode(buffer));
          buffer = '';
        }
      };
      while (i < text.length) {
        if (text[i] === '*' && text[i + 1] === '*') {
          const end = text.indexOf('**', i + 2);
          if (end !== -1 && end > i + 2) {
            flush();
            const strong = document.createElement('strong');
            renderInline(text.slice(i + 2, end), strong);
            container.appendChild(strong);
            i = end + 2;
            continue;
          }
        }
        if (text[i] === '`') {
          const end = text.indexOf('`', i + 1);
          if (end !== -1) {
            flush();
            const code = document.createElement('code');
            code.textContent = text.slice(i + 1, end);
            container.appendChild(code);
            i = end + 1;
            continue;
          }
        }
        if (text[i] === '*' && text[i + 1] !== '*' && (i === 0 || text[i - 1] !== '*')) {
          let end = -1;
          for (let j = i + 1; j < text.length; j++) {
            if (text[j] === '*' && text[j + 1] !== '*' && text[j - 1] !== '*') {
              end = j;
              break;
            }
          }
          if (end !== -1 && end > i + 1) {
            flush();
            const em = document.createElement('em');
            renderInline(text.slice(i + 1, end), em);
            container.appendChild(em);
            i = end + 1;
            continue;
          }
        }
        buffer += text[i];
        i++;
      }
      flush();
    }

    function parseTableRow(line) {
      let s = line.trim();
      if (s.startsWith('|')) s = s.slice(1);
      if (s.endsWith('|')) s = s.slice(0, -1);
      return s.split('|').map((c) => c.trim());
    }

    function isTableSeparator(line) {
      return /^\s*\|?\s*:?-{2,}:?(\s*\|\s*:?-{2,}:?)+\s*\|?\s*$/.test(line || '');
    }

    function renderMarkdown(text, container) {
      const lines = text.split(/\r?\n/);
      let i = 0;

      while (i < lines.length) {
        const line = lines[i];
        const trimmed = line.trim();

        if (trimmed === '' || trimmed === '---') {
          i++;
          continue;
        }

        const headingMatch = trimmed.match(/^(#{1,6})\s+(.*)$/);
        if (headingMatch) {
          const h = document.createElement('p');
          h.className = 'md-heading';
          const strong = document.createElement('strong');
          renderInline(headingMatch[2], strong);
          h.appendChild(strong);
          container.appendChild(h);
          i++;
          continue;
        }

        if (trimmed.startsWith('>')) {
          const quoteLines = [];
          while (i < lines.length && lines[i].trim().startsWith('>')) {
            quoteLines.push(lines[i].trim().replace(/^>\s?/, ''));
            i++;
          }
          const blockquote = document.createElement('blockquote');
          const p = document.createElement('p');
          renderInline(quoteLines.join(' '), p);
          blockquote.appendChild(p);
          container.appendChild(blockquote);
          continue;
        }

        if (trimmed.startsWith('|') && i + 1 < lines.length && isTableSeparator(lines[i + 1])) {
          const headerCells = parseTableRow(trimmed);
          i += 2;
          const rows = [];
          while (i < lines.length && lines[i].trim().startsWith('|')) {
            rows.push(parseTableRow(lines[i]));
            i++;
          }
          const table = document.createElement('table');
          const thead = document.createElement('thead');
          const headerRow = document.createElement('tr');
          headerCells.forEach((cell) => {
            const th = document.createElement('th');
            renderInline(cell, th);
            headerRow.appendChild(th);
          });
          thead.appendChild(headerRow);
          table.appendChild(thead);
          const tbody = document.createElement('tbody');
          rows.forEach((row) => {
            const tr = document.createElement('tr');
            row.forEach((cell) => {
              const td = document.createElement('td');
              renderInline(cell, td);
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          container.appendChild(table);
          continue;
        }

        if (/^\s*[\*\-\+]\s+/.test(line)) {
          const stack = [];
          while (i < lines.length && /^\s*[\*\-\+]\s+/.test(lines[i])) {
            const m = lines[i].match(/^(\s*)[\*\-\+]\s+(.*)$/);
            const indent = m[1].length;
            const itemText = m[2];

            while (stack.length > 0 && stack[stack.length - 1].indent > indent) {
              stack.pop();
            }

            let ul;
            if (stack.length === 0) {
              ul = document.createElement('ul');
              container.appendChild(ul);
              stack.push({ ul, indent });
            } else if (stack[stack.length - 1].indent < indent) {
              ul = document.createElement('ul');
              const parentUl = stack[stack.length - 1].ul;
              const lastLi = parentUl.lastChild;
              if (lastLi) {
                lastLi.appendChild(ul);
              } else {
                parentUl.appendChild(ul);
              }
              stack.push({ ul, indent });
            } else {
              ul = stack[stack.length - 1].ul;
            }

            const li = document.createElement('li');
            renderInline(itemText, li);
            ul.appendChild(li);
            i++;
          }
          continue;
        }

        if (/^\s*\d+\.\s+/.test(line)) {
          const ol = document.createElement('ol');
          while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
            const m = lines[i].match(/^\s*\d+\.\s+(.*)$/);
            const li = document.createElement('li');
            renderInline(m[1], li);
            ol.appendChild(li);
            i++;
          }
          container.appendChild(ol);
          continue;
        }

        const paraLines = [];
        while (i < lines.length) {
          const t = lines[i].trim();
          const l = lines[i];
          if (t === '' || t === '---') break;
          if (/^#{1,6}\s/.test(t)) break;
          if (t.startsWith('>')) break;
          if (/^\s*[\*\-\+]\s+/.test(l)) break;
          if (/^\s*\d+\.\s+/.test(l)) break;
          if (t.startsWith('|') && i + 1 < lines.length && isTableSeparator(lines[i + 1])) break;
          paraLines.push(lines[i]);
          i++;
        }
        if (paraLines.length) {
          const p = document.createElement('p');
          renderInline(paraLines.join('\n'), p);
          container.appendChild(p);
        }
      }
    }

    function renderBlocks(blocks) {
      const frag = document.createDocumentFragment();
      blocks.forEach((b) => {
        const wrap = document.createElement('div');
        wrap.className = 'qa-block';

        if (b.question) {
          const qEl = document.createElement('div');
          qEl.className = 'q';
          renderInline(b.question, qEl);
          wrap.appendChild(qEl);
        }

        if (b.answer) {
          const aEl = document.createElement('div');
          aEl.className = 'a';
          renderMarkdown(b.answer, aEl);
          wrap.appendChild(aEl);
        }

        frag.appendChild(wrap);
      });
      outputEl.innerHTML = '';
      outputEl.appendChild(frag);
    }

    formatBtn.addEventListener('click', () => {
      const raw = inputEl.value;
      if (!raw.trim()) {
        setStatus('statusNothing', true);
        showToast(t('toastPasteFirst'), true);
        return;
      }
      const blocks = parseAIExport(raw);
      if (blocks.length) {
        lastBlocks = blocks;
        outputState = { kind: 'rendered' };
        renderBlocks(blocks);
        setStatus('statusFormattedN', false, blocks.length);
      } else {
        outputState = { kind: 'noBlocks' };
        refreshOutput();
        setStatus('statusNoBlocks', true);
      }
    });

    clearBtn.addEventListener('click', () => {
      inputEl.value = '';
      lastBlocks = [];
      outputState = { kind: 'empty' };
      refreshOutput();
      setStatus('statusCleared');
    });

    copyRichBtn.addEventListener('click', () => {
      const selection = window.getSelection();
      const range = document.createRange();
      try {
        range.selectNodeContents(outputEl);
        selection.removeAllRanges();
        selection.addRange(range);
        const successful = document.execCommand('copy');
        selection.removeAllRanges();
        if (successful) {
          showToast(t('toastCopiedRich'));
        } else {
          showToast(t('toastCopyFailed'), true);
        }
      } catch (e) {
        selection.removeAllRanges();
        showToast(t('toastCopyFailedPrefix') + e.message, true);
      }
    });

    copyPlainBtn.addEventListener('click', async () => {
      const text = outputEl.innerText || '';
      if (!text.trim()) {
        showToast(t('toastNothingToCopy'), true);
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        showToast(t('toastCopiedPlain'));
      } catch {
        showToast(t('toastClipboardBlocked'), true);
      }
    });

    loadSampleBtn.addEventListener('click', () => {
      const sample = `> From: https://gemini.google.com/app/0b56c76930eb84e7

      inputEl.value = sample;

    downloadHtmlBtn.addEventListener('click', () => {
      const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ai-qa-formatter-erase-meta.html';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast(t('toastDownloaded'));
    });

    langToggleBtn.addEventListener('click', () => {
      currentLang = currentLang === 'ko' ? 'en' : 'ko';
      localStorage.setItem('qa-formatter-lang', currentLang);
      applyLanguage();
    });

    applyLanguage();
  </script>
